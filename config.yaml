# central config shared across notebooks and src/
# override per-environment with env vars where noted

models:
	primary:
		hf_id: "google/gemma-3-12b-pt"
		dtype: "bfloat16"
		n_layers: 48
		extraction_layer: 32  # ~2/3 depth per Anthropic protocol
	fallback_it:
		hf_id: "google/gemma-3-12b-it"
		dtype: "bfloat16"
	sanity:
		hf_id: "google/gemma-2-2b"  # smoke-test only, fits on T4
		dtype: "bfloat16"

sae:
	# Gemma Scope 2, residual-stream post, mid-layer
	release: "gemma-scope-2-12b-pt-resid-post"
	layer: 32
	width: "16k"
	l0_target: "medium"

extraction:
	# Anthropic protocol (Sofroniew/Lindsey 2026)
	topics_per_emotion: 100
	stories_per_topic: 12
	token_skip: 50
	pc_project_out_variance: 0.50
	l2_normalize: true
	emotions:
		# TODO: confirm 5 fitted with Akshat before May 15 prereg lock
		- desperation
		- calm
		- sad
		- angry
		- loving

faitheval:
	hf_dataset: "Salesforce/FaithEval-unanswerable-v1.0"
	abstention_labels:
		- "unanswerable"
		- "unknown"
		- "no answer"
		- "no information"
		- "not"
		- "unclear"
	prompt_template: |
		Read the context and answer the question. If there is no information available from the context, the answer should be "unknown".

		Context: {context}
		Question: {question}
		Answer:

steering:
	# Anthropic range 0.025-0.1 (fraction of residual norm)
	alpha: 0.05

paths:
	# local defaults; override via env vars on Colab/Vast/Lambda
	data_dir: "data"
	outputs_dir: "outputs"
	hf_artifact_repo: "bray/desperation-circuit-artifacts"  # private dataset repo

secrets:
	# read from env, never commit
	hf_token_env: "HF_TOKEN"
	anthropic_key_env: "ANTHROPIC_API_KEY"
